{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">會員註冊</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('auth.handle_register') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted fw-bold">使用者名稱</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="請輸入使用者名稱" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted fw-bold">電子郵件 (Email)</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted fw-bold">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="請輸入密碼" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">立即註冊</button>
                    </div>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted mb-0">已經有帳號了嗎？ <a href="{{ url_for('auth.login_page') }}" class="text-decoration-none fw-bold">前往登入</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
