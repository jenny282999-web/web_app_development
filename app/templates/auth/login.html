{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0">會員登入</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('auth.handle_login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted fw-bold">電子郵件 (Email)</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted fw-bold">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="請輸入密碼" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm">登入</button>
                    </div>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted mb-0">還沒有帳號嗎？ <a href="{{ url_for('auth.register_page') }}" class="text-decoration-none fw-bold text-success">馬上註冊</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
