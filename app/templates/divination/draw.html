{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-lg-8">
        <h2 class="mb-4 text-primary fw-bold">虔誠求籤</h2>
        <div class="card shadow-lg border-0 rounded-4 p-5 mb-5 align-items-center bg-white">
            
            <!-- 搖籤筒動畫區 (簡單的 CSS 動畫) -->
            <div id="draw-container" class="mb-5">
                <div id="shaking-cup" style="font-size: 8rem; transition: transform 0.2s;">
                    🎍
                </div>
                <p id="instruction-text" class="text-muted mt-4 mb-0 fs-5">請先在心中默念您的姓名、出生年月日、地址以及想問的問題。<br>確認後，點擊下方「開始求籤」按鈕。</p>
            </div>

            <!-- 操作表單/按鈕 -->
            <form action="{{ url_for('divination.result') }}" method="POST" id="draw-form">
                <button type="button" class="btn btn-warning btn-lg rounded-pill fw-bold px-5 py-3 shadow fs-4 text-dark" id="btn-draw" onclick="startDraw()">🙏 開始求籤</button>
            </form>

        </div>
    </div>
</div>

<script>
    function startDraw() {
        const btn = document.getElementById('btn-draw');
        const cup = document.getElementById('shaking-cup');
        const text = document.getElementById('instruction-text');
        const form = document.getElementById('draw-form');

        // 改按鈕狀態
        btn.disabled = true;
        btn.innerText = "神明賜籤中...";
        text.innerText = "正在為您抽出靈籤...";

        // 簡單的搖晃動畫
        let shakes = 0;
        let shakeInterval = setInterval(() => {
            let rotate = (shakes % 2 === 0) ? 20 : -20;
            cup.style.transform = `rotate(${rotate}deg)`;
            shakes++;

            if (shakes > 15) {
                // 動畫結束
                clearInterval(shakeInterval);
                cup.style.transform = "rotate(0deg)";
                cup.innerText = "📜";
                text.innerHTML = "<span class='text-success fw-bold'>已為您抽出一支籤！</span>";
                
                // 延遲跳轉
                setTimeout(() => {
                    form.submit();
                }, 1000);
            }
        }, 100);
    }
</script>
{% endblock %}
